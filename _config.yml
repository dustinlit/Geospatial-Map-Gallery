title: "Geospatial Map Gallery"
description: >
  Hello, my name is Dustin.

  I’m drawn to the intersection of data and spatial science, especially where it helps us understand the natural world. I graduated with a B.S. in Data Science and a GIS Certificate from Arizona State University, and I am currently pursuing graduate‑level remote sensing and geospatial analysis studies at Penn State.

  After a 15‑year career in medical laboratory science, I am transitioning into the geospatial and environmental analytics field with a focus on clear, effective spatial communication and applied environmental problem‑solving.

  ## About This Portfolio
  This portfolio presents a curated selection of cartographic and geospatial analysis work, highlighting thematic mapping, spatial modeling, and data visualization techniques developed through GIS and remote sensing workflows.

  - Forestry and land‑use mapping projects
  - Urban development and transportation analyses
  - Wildlife and habitat‑focused studies
  - Environmental health and interpolation work
  - Global reference maps and datasets
  - Story Maps created for coursework 
